<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ULTIMATE MBTI</title>
<style>
  :root{
    --bg-black:#0c0a08;
    --wood:#1c1611;
    --wood-light:#2a2119;
    --brass:#c9a15f;
    --brass-dim:#8a7145;
    --whiskey:#8b3a2f;
    --cream:#e9e0c8;
    --muted:#8b8172;
    --line: rgba(201,161,95,0.25);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background:var(--bg-black);
    color:var(--cream);
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho","游明朝",serif;
    overflow-x:hidden;
  }
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(201,161,95,0.08), transparent 60%),
      radial-gradient(ellipse at 50% 110%, rgba(139,58,47,0.10), transparent 60%),
      var(--bg-black);
    padding:24px;
  }
  .grain{
    position:fixed; inset:0; pointer-events:none; z-index:1;
    opacity:0.05;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px);
    mix-blend-mode:overlay;
  }
  .dust{position:fixed; inset:0; pointer-events:none; z-index:2; overflow:hidden;}
  .dust span{
    position:absolute; width:2px; height:2px; border-radius:50%;
    background:var(--brass); opacity:0;
    animation: floaty 12s linear infinite;
  }
  @keyframes floaty{
    0%{opacity:0; transform:translateY(0) translateX(0);}
    10%{opacity:.4;}
    90%{opacity:.2;}
    100%{opacity:0; transform:translateY(-120vh) translateX(20px);}
  }

  .stage{
    position:relative; z-index:3;
    width:100%; max-width:560px;
  }

  .screen{ display:none; }
  .screen.active{ display:block; animation: fadeIn .8s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  .door-wrap{ text-align:center; }
  .eyebrow{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    letter-spacing:.4em; font-size:11px; color:var(--brass-dim);
    text-transform:uppercase;
  }
  h1.title{
    font-size:clamp(28px,6vw,42px);
    font-weight:600; letter-spacing:.12em;
    margin:18px 0 8px;
    color:var(--cream);
    text-shadow:0 0 24px rgba(201,161,95,0.25);
  }
  .subtitle{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:13px; color:var(--muted); letter-spacing:.05em; line-height:1.9;
    margin-bottom:40px;
  }
  .door{
    width:180px; height:260px; margin:0 auto 36px;
    border:2px solid var(--brass-dim);
    background:linear-gradient(180deg,var(--wood-light),var(--wood) 60%);
    border-radius:6px 6px 60px 60px / 6px 6px 30px 30px;
    position:relative;
    box-shadow: inset 0 0 30px rgba(0,0,0,.6), 0 20px 40px rgba(0,0,0,.5);
  }
  .door::before{
    content:"";
    position:absolute; left:16px; top:16px; right:16px; bottom:16px;
    border:1px solid var(--line);
  }
  .door .knob{
    position:absolute; right:18px; top:50%; width:10px; height:10px;
    border-radius:50%; background:var(--brass);
    box-shadow:0 0 10px var(--brass);
  }
  .door .plate{
    position:absolute; top:34px; left:50%; transform:translateX(-50%);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:10px; letter-spacing:.3em; color:var(--brass-dim);
    border:1px solid var(--brass-dim); padding:6px 10px;
    white-space:nowrap;
  }

  .btn{
    appearance:none; border:1px solid var(--brass);
    background:transparent; color:var(--brass);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:13px; letter-spacing:.25em;
    padding:14px 32px;
    cursor:pointer;
    position:relative; overflow:hidden;
    transition:color .4s ease;
  }
  .btn::before{
    content:""; position:absolute; inset:0;
    background:var(--brass); transform:translateX(-101%);
    transition:transform .4s ease; z-index:-1;
  }
  .btn:hover{ color:#161210; }
  .btn:hover::before{ transform:translateX(0); }
  .btn:disabled{ opacity:.35; cursor:default; }
  .btn:disabled:hover{ color:var(--brass); }
  .btn:disabled:hover::before{ transform:translateX(-101%); }

  .bar-panel{
    background:linear-gradient(180deg,var(--wood-light),var(--wood));
    border:1px solid var(--line);
    border-radius:4px;
    padding:36px 28px;
    box-shadow: inset 0 0 60px rgba(0,0,0,.5), 0 20px 50px rgba(0,0,0,.6);
  }
  .panel-label{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:11px; letter-spacing:.35em; color:var(--brass-dim);
    text-align:center; margin-bottom:28px; text-transform:uppercase;
  }
  .reels{
    display:flex; justify-content:center; align-items:center; gap:12px;
    margin-bottom:30px;
  }
  .reel-sep{
    font-family:"Georgia",serif; font-size:34px; color:var(--brass-dim);
    padding-bottom:6px;
  }
  .reel{
    width:64px; height:88px;
    background:#100d0a;
    border:1px solid var(--brass-dim);
    border-radius:3px;
    position:relative;
    display:flex; align-items:center; justify-content:center;
    box-shadow: inset 0 4px 10px rgba(0,0,0,.7), inset 0 -4px 10px rgba(0,0,0,.5);
    perspective: 300px;
  }
  .reel::after{
    content:""; position:absolute; left:0; right:0; top:50%;
    height:1px; background:rgba(0,0,0,.6); transform:translateY(-.5px);
  }
  .reel .letter{
    font-family:"Georgia","Hiragino Mincho ProN",serif;
    font-size:38px; font-weight:700; color:var(--brass);
    text-shadow:0 0 14px rgba(201,161,95,0.35);
    transition: transform .06s linear;
  }
  .reel.spinning .letter{ animation: flap .09s linear infinite; }
  @keyframes flap{
    0%{ transform: translateY(0) scaleY(1); opacity:1;}
    45%{ transform: translateY(-6px) scaleY(0.7); opacity:.5;}
    55%{ transform: translateY(6px) scaleY(0.7); opacity:.5;}
    100%{ transform: translateY(0) scaleY(1); opacity:1;}
  }
  .reel .letter.bloom{ animation: bloom .55s ease-out; }
  @keyframes bloom{
    0%{ transform: scale(1); opacity:1; filter:blur(0) brightness(1); text-shadow:0 0 14px rgba(201,161,95,0.35); }
    35%{ transform: scale(2.1); opacity:.85; filter:blur(1.5px) brightness(1.6); text-shadow:0 0 40px rgba(201,161,95,0.9); }
    100%{ transform: scale(1); opacity:1; filter:blur(0) brightness(1); text-shadow:0 0 14px rgba(201,161,95,0.35); }
  }
  .reel.locked{ border-color:var(--brass); box-shadow:0 0 16px rgba(201,161,95,0.35), inset 0 4px 10px rgba(0,0,0,.7); }

  .lever-row{ text-align:center; }
  .hint{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:11px; color:var(--muted); letter-spacing:.1em; margin-top:16px;
  }

  .card{
    background:
      radial-gradient(ellipse at 50% 0%, rgba(120,90,30,0.12), transparent 55%),
      linear-gradient(180deg,#e8d3a0,#d9bd80);
    border:1px solid var(--brass-dim);
    border-radius:4px;
    padding:44px 30px 34px;
    text-align:center;
    position:relative;
  }
  .card::before,.card::after{
    content:""; position:absolute; width:34px; height:34px;
    border:3px solid rgb(70,0,0);
    opacity:.75;
  }
  .card::before{ top:8px; left:8px; border-right:none; border-bottom:none; }
  .card::after{ bottom:8px; right:8px; border-left:none; border-top:none; }

  #illust-canvas{
    width:180px; height:180px;
    margin:0 auto 22px;
    display:block;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,.25));
  }
  .code{
    font-family:"Georgia",serif;
    font-size:clamp(28px,7vw,44px);
    letter-spacing:.18em;
    color:rgb(70,0,0);
    text-shadow:none;
    margin-bottom:6px;
  }
  .code-label{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:10px; letter-spacing:.35em; color:var(--brass-dim);
    margin-bottom:24px;
  }
  .divider{
    width:40px; height:1px; background:var(--brass-dim);
    margin:0 auto 24px; opacity:.6;
  }
  .type-name{
    font-size:clamp(22px,5vw,28px);
    line-height:1.7;
    color:rgb(70,0,0);
    margin-bottom:18px;
    letter-spacing:.04em;
  }
  .type-name b{ color:var(--whiskey); font-weight:600; }
  .flavor{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:13px; color:var(--muted); line-height:2; letter-spacing:.03em;
    margin-bottom:8px;
  }
  .caption{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:10px; color:var(--brass-dim); letter-spacing:.2em; margin-top:30px;
  }

  .actions{
    display:flex; gap:12px; justify-content:center; margin-top:30px; flex-wrap:wrap;
  }
  .btn.ghost{ border-color:var(--muted); color:var(--muted); font-size:12px; padding:12px 22px;}
  .btn.ghost::before{ background:var(--muted); }
  .btn.ghost:hover{ color:#161210; }

  footer{
    text-align:center; margin-top:26px;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:10px; color:var(--muted); opacity:.6; letter-spacing:.1em;
    line-height:2;
  }
  footer a{
    color:var(--brass); text-decoration:underline;
    opacity:1;
  }

  @media (max-width:420px){
    .reel{ width:48px; height:66px; }
    .reel .letter{ font-size:26px; }
    .reels{ gap:8px; }
    .reel-sep{ font-size:26px; }
    .bar-panel{ padding:28px 16px; }
  }
</style>

<script>
/* ============ データ ============ */
// デフォルト(スプレッドシート取得に失敗した場合のフォールバック)
let ADJ = ["孤高な","憂鬱な","妖艶な","寡黙な","放浪の","酩酊の","深夜の","一匹狼の","気まぐれな","謎めいた","退廃的な","優雅な","無頼な","感傷的な","冷徹な","情熱的な","世捨て人の","夜更かしの","苦味走った","甘美な","破滅的な","陽気な","皮肉屋の","浮世離れした","一期一会の","名もなき","影のある","気高き","酔狂な","不器用な","自由奔放な","神出鬼没の"];
let NOUN = ["夜霧","一杯のジン","灯火","密偵","吟遊詩人","梟","黒猫","常連客","バーテンダー","迷い酒","月光","氷塊","燻製香","流れ者","秘密結社員","蝶","亡霊","錬金術師","カウンターの隅","万年筆","古時計","蜃気楼","一輪の薔薇","深夜ラジオ","密造酒","賭博師","旅人","探偵","影法師","ジャズの調べ","迷宮","星屑"];

// Googleスプレッドシート「フォームの回答 1」シートをCSVで取得(B列=形容詞, C列=名詞)
// gid(タブのID)を指定する方式だと自動生成シートのgidがずれて400エラーになることがあるため、
// シート名を直接指定できる gviz/tq エンドポイントを使用しています。
// タブ名を変更した場合は、下記URLの sheet= の後ろ(URLエンコードされたシート名)を書き換えてください。
const WORDPOOL_CSV_URL = "https://docs.google.com/spreadsheets/d/1mgzikHSxEAivSlJLSyKNqhPov6lxJ3C78TdOpBKPSl4/gviz/tq?tqx=out:csv&sheet=" + encodeURIComponent("フォームの回答 1");

// シンプルなCSVパーサ(ダブルクォート囲み・エスケープに対応)
function parseCSV(text){
  const rows = [];
  const lines = text.split(/\r\n|\n/);
  for(const line of lines){
    if(line === "") continue;
    const cells = [];
    let cur = "";
    let inQuotes = false;
    for(let i=0;i<line.length;i++){
      const ch = line[i];
      if(inQuotes){
        if(ch === '"'){
          if(line[i+1] === '"'){ cur += '"'; i++; }
          else inQuotes = false;
        } else cur += ch;
      } else {
        if(ch === '"') inQuotes = true;
        else if(ch === ","){ cells.push(cur); cur = ""; }
        else cur += ch;
      }
    }
    cells.push(cur);
    rows.push(cells);
  }
  return rows;
}

// スプレッドシートからワードプールを取得してADJ/NOUNを上書き(失敗時はデフォルトのまま)
async function loadWordPool(){
  try{
    const res = await fetch(WORDPOOL_CSV_URL);
    if(!res.ok) throw new Error("fetch failed: " + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    const newAdj = [];
    const newNoun = [];
    // 1行目はヘッダー(タイムスタンプ/形容詞/名詞)なのでスキップ、B列・C列を使用
    for(let i=1;i<rows.length;i++){
      const adj = (rows[i][1] || "").trim();
      const noun = (rows[i][2] || "").trim();
      if(adj) newAdj.push(adj);
      if(noun) newNoun.push(noun);
    }
    if(newAdj.length > 0 && newNoun.length > 0){
      ADJ = newAdj;
      NOUN = newNoun;
    }
  }catch(e){
    console.warn("ワードプールの取得に失敗したため、デフォルトのワードプールを使用します。", e);
  }
}
const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

/* ============ イラスト(線画+色マスク合成) ============ */
const PALETTE = [
  "#e63946","#f1c40f","#f39c12","#e67e22","#d35400","#c0392b",
  "#8e44ad","#9b59b6","#6c3fa0","#4a148c","#3d5afe","#1565c0",
  "#0288d1","#00838f","#00897b","#2e7d32","#558b2f","#9e9d24",
  "#c2185b","#ad1457","#ff6f91","#ff9800","#ffca28","#26a69a",
  "#00acc1","#5c6bc0","#7e57c2","#8d6e63","#78909c","#37474f",
  "#c9a15f","#8b3a2f","#4a5d4e","#5b4a6f","#8a7145"
];

// イラストは illust/manifest.json に列挙されたフォルダ名を元に外部ファイルとして読み込む
// (illust/<name>/line.png, color1.png, color2.png の3枚セット)
let ILLUSTRATIONS = [];

async function loadIllustManifest(){
  try{
    const res = await fetch("illust/manifest.json");
    if(!res.ok) throw new Error("fetch failed: " + res.status);
    const data = await res.json();
    const names = Array.isArray(data.illustrations) ? data.illustrations : [];
    ILLUSTRATIONS = names.map(name => ({
      line: `illust/${name}/line.png`,
      c1: `illust/${name}/color1.png`,
      c2: `illust/${name}/color2.png`
    }));
  }catch(e){
    console.warn("イラスト一覧の取得に失敗しました。イラストなしで続行します。", e);
    ILLUSTRATIONS = [];
  }
}

function loadImage(src){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=> resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

// テクスチャは textures/manifest.json に列挙されたファイル名を元に外部ファイルとして読み込む
let TEXTURES = [];
let TEXTURE_IMAGES = [];

async function loadTextureManifest(){
  try{
    const res = await fetch("textures/manifest.json");
    if(!res.ok) throw new Error("fetch failed: " + res.status);
    const data = await res.json();
    TEXTURES = Array.isArray(data.textures) ? data.textures : [];
    TEXTURE_IMAGES = await Promise.all(
      TEXTURES.map(name => loadImage(`textures/${name}`))
    );
  }catch(e){
    console.warn("テクスチャ一覧の取得に失敗しました。テクスチャなしで続行します。", e);
    TEXTURES = [];
    TEXTURE_IMAGES = [];
  }
}

function randomColor(){
  return PALETTE[Math.floor(Math.random()*PALETTE.length)];
}

// 単色 or グラデーション or (将来的に)テクスチャパターンをランダムに選んで fillStyle を作る
function randomFillStyle(octx, w, h){
  const roll = Math.random();
  if(TEXTURE_IMAGES.length > 0 && roll < 0.15){
    const tex = TEXTURE_IMAGES[Math.floor(Math.random()*TEXTURE_IMAGES.length)];
    return octx.createPattern(tex, 'repeat');
  }
  if(roll < 0.55){
    return randomColor();
  }
  const c1 = randomColor();
  let c2 = randomColor();
  while(c2 === c1) c2 = randomColor();
  const angle = Math.random()*Math.PI*2;
  const cx = w/2, cy = h/2, r = Math.max(w,h)/2;
  const x1 = cx - Math.cos(angle)*r, y1 = cy - Math.sin(angle)*r;
  const x2 = cx + Math.cos(angle)*r, y2 = cy + Math.sin(angle)*r;
  const grad = octx.createLinearGradient(x1,y1,x2,y2);
  grad.addColorStop(0, c1);
  grad.addColorStop(1, c2);
  return grad;
}

function paintMasked(ctx, w, h, maskImg){
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const octx = off.getContext('2d');
  octx.drawImage(maskImg, 0, 0, w, h);
  octx.globalCompositeOperation = 'source-in';
  octx.fillStyle = randomFillStyle(octx, w, h);
  octx.fillRect(0, 0, w, h);
  ctx.drawImage(off, 0, 0);
}

async function renderIllust(){
  const canvas = document.getElementById('illust-canvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);

  if(ILLUSTRATIONS.length === 0) return;

  const set = ILLUSTRATIONS[Math.floor(Math.random()*ILLUSTRATIONS.length)];
  const [line, mask1, mask2] = await Promise.all([set.line, set.c1, set.c2].map(loadImage));

  paintMasked(ctx, w, h, mask2);
  paintMasked(ctx, w, h, mask1);
  ctx.drawImage(line, 0, 0, w, h);
}

// GitHub Pagesで公開したら、実際の公開URLに書き換えてください
const SITE_URL = "https://cceight.github.io/ultimate-mbti/";

/* ============ 音(Web Audio・合成) ============ */
let actx;
function ac(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function tick(freq=900, dur=0.03, type='square', vol=0.05){
  try{
    const c = ac(); const o = c.createOscillator(); const g = c.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = vol;
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+dur);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime+dur);
  }catch(e){}
}
function chime(){
  const notes=[880,1108,1318,1760];
  notes.forEach((f,i)=>{
    setTimeout(()=>tick(f,0.5,'sine',0.045), i*90);
  });
}
function doorCreak(){
  try{
    const c = ac(); const o = c.createOscillator(); const g = c.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(180,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(90,c.currentTime+0.6);
    g.gain.value=0.03; g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+0.6);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime+0.6);
  }catch(e){}
}

/* ============ 画面遷移 ============ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('btn-retry').addEventListener('click', ()=>{
  const resetLetters = ['M','B','T','I'];
  document.querySelectorAll('.reel').forEach((r, idx)=>{
    r.classList.remove('locked','spinning');
    r.querySelector('.letter').textContent = resetLetters[idx] || 'M';
  });
  document.getElementById('btn-spin').disabled = false;
  showScreen('screen-roulette');
});

/* ============ ルーレット ============ */
const btnSpin = document.getElementById('btn-spin');
btnSpin.addEventListener('click', spinAll);

btnSpin.disabled = true;
Promise.all([loadWordPool(), loadIllustManifest(), loadTextureManifest()])
  .finally(()=>{ btnSpin.disabled = false; });

function spinAll(){
  btnSpin.disabled = true;
  const reels = document.querySelectorAll('.reel');
  const finalLetters = [];
  const intervals = [];
  const intervalSpeed = 65;

  reels.forEach((reel, idx)=>{
    reel.classList.add('spinning');
    reel.classList.remove('locked');
    const letterEl = reel.querySelector('.letter');
    const iv = setInterval(()=>{
      letterEl.textContent = LETTERS[Math.floor(Math.random()*26)];
      tick(260+Math.random()*80, 0.03, 'triangle', 0.035);
    }, intervalSpeed);
    intervals.push(iv);

    const stopDelay = 750 + idx*480 + Math.random()*180;
    setTimeout(()=>{
      clearInterval(iv);
      const final = LETTERS[Math.floor(Math.random()*26)];
      letterEl.textContent = final;
      finalLetters[idx] = final;
      reel.classList.remove('spinning');
      reel.classList.add('locked');
      letterEl.classList.add('bloom');
      letterEl.addEventListener('animationend', ()=> letterEl.classList.remove('bloom'), {once:true});
      tick(1200, 0.08, 'triangle', 0.06);

      if(idx === reels.length-1){
        const extra = LETTERS[Math.floor(Math.random()*26)];
        setTimeout(()=> revealResult(finalLetters.join('') + extra), 500);
      }
    }, stopDelay);
  });
}

/* ============ 結果生成 ============ */
function revealResult(code){
  const adjIdx = Math.floor(Math.random()*ADJ.length);
  const nounIdx = Math.floor(Math.random()*NOUN.length);
  const adj = ADJ[adjIdx];
  const noun = NOUN[nounIdx];

  const displayCode = code.slice(0,4) + '-' + code.slice(4);
  document.getElementById('result-code').textContent = displayCode;
  document.getElementById('result-name').innerHTML = `<b>${adj}</b> <b>${noun}</b>`;

  window.__last = {code: displayCode, adj, noun, adjIdx, nounIdx};

  renderIllust();

  chime();
  showScreen('screen-result');
}

/* ============ シェアカード生成 ============ */
document.getElementById('btn-save').addEventListener('click', ()=>{
  if(!window.__last) return;
  const {code, adj, noun} = window.__last;
  const canvas = document.getElementById('share-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // 背景
  const grad = ctx.createRadialGradient(W/2, 0, 50, W/2, H*0.4, H*0.9);
  grad.addColorStop(0, '#2a2119');
  grad.addColorStop(1, '#0c0a08');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // 外枠
  ctx.strokeStyle = 'rgba(201,161,95,0.55)';
  ctx.lineWidth = 2;
  ctx.strokeRect(40,40,W-80,H-80);

  // コーナー装飾
  ctx.strokeStyle = 'rgba(201,161,95,0.9)';
  ctx.lineWidth = 3;
  const corner = 40;
  [[70,70,1,1],[W-70,70,-1,1],[70,H-70,1,-1],[W-70,H-70,-1,-1]].forEach(([x,y,dx,dy])=>{
    ctx.beginPath();
    ctx.moveTo(x, y+corner*dy);
    ctx.lineTo(x,y);
    ctx.lineTo(x+corner*dx,y);
    ctx.stroke();
  });

  // イラスト(結果画面に描画済みのcanvasをそのまま流用)
  const illustCanvas = document.getElementById('illust-canvas');
  const illustSize = 380;
  const illustX = W/2 - illustSize/2;
  const illustY = 90;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 24;
  ctx.shadowOffsetY = 10;
  ctx.drawImage(illustCanvas, illustX, illustY, illustSize, illustSize);
  ctx.restore();

  // コード
  ctx.textAlign = 'center';
  ctx.fillStyle = '#c9a15f';
  ctx.font = 'bold 110px Georgia, serif';
  ctx.shadowColor = 'rgba(201,161,95,0.5)';
  ctx.shadowBlur = 30;
  ctx.fillText(code, W/2, illustY + illustSize + 130);
  ctx.shadowBlur = 0;

  // 形容詞・名詞
  ctx.fillStyle = '#e9e0c8';
  ctx.font = '44px "Hiragino Mincho ProN","Yu Mincho",serif';
  ctx.fillText(`${adj} ${noun}`, W/2, illustY + illustSize + 220);

  const link = document.createElement('a');
  link.download = `ultimate-mbti-${code}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});
